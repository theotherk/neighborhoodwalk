<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #star-timeline {
    position: fixed; bottom: 20px; left: 20px; right: 20px;
    display: flex; gap: 8px; align-items: center;
    font: 13px/1.4 monospace; color: #999;
    pointer-events: none; user-select: none;
    overflow: hidden; height: 20px;
  }
  #star-timeline span {
    width: 120px; text-align: center; flex-shrink: 0;
    padding: 2px 4px; border-radius: 4px;
    background: rgba(255,255,255,0.06);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #tooltip {
    position: fixed; pointer-events: none; user-select: none;
    color: #eee; font: 13px/1.5 monospace;
    background: rgba(0,0,0,0.8); border: 1px solid #444;
    border-radius: 6px; padding: 8px 12px;
    opacity: 0; transition: opacity 0.15s;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .name { font-size: 15px; font-weight: bold; }
  #tooltip .prop { color: #999; }
  #tooltip .pent { display: inline-block; width: 14px; height: 14px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  #keymap {
    position: fixed; left: 12px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 12px;
    font: 33px/1 monospace; color: rgba(255,255,255,0.35);
    z-index: 10;
  }
  #keymap div {
    display: flex; align-items: center; gap: 8px;
    transition: color 0.15s; cursor: pointer;
  }
  #keymap .active { color: rgba(255,255,255,0.7); }
  #keymap .red { color: rgba(255,100,80,0.7); }
</style>

// Assign pentatonic scale note based on absmag quintiles
(function(arr) {
  var absmags = arr.map(function(s) { return s.absmag; }).sort(function(a, b) { return a - b; });
  var b1 = absmags[199], b2 = absmags[399], b3 = absmags[598], b4 = absmags[798];
  arr.forEach(function(s) {
    var idx = s.absmag <= b1 ? 0 : s.absmag <= b2 ? 1 : s.absmag <= b3 ? 2 : s.absmag <= b4 ? 3 : 4;
    s.pentatonic = ['C', 'D', 'E', 'G', 'A'][idx];
  });
})(stars);


function spectralColor(spect, ci) {
  const primary = (spect || '').charAt(0);
  if (primary === 'D') return new THREE.Color(0.8, 0.8, 0.9);
  if (ci !== undefined && ci !== '' && ci !== 0) {
    const temp = 4600 * (1 / (ci + 0.32) - 1 / 2.1 + 1);
    const h = Math.max(0, Math.min(0.7, 0.7 - temp / 30000));
    return new THREE.Color().setHSL(h, 0.8, 0.3 + 0.65 * Math.min(1, temp / 10000));
  }
  const hues = { O: 0.66, B: 0.63, A: 0.08, F: 0.10, G: 0.13, K: 0.08, M: 0.02 };
  return new THREE.Color().setHSL(hues[primary] || 0.6, 0.7, 0.5);
}

let audioCtx = null;

function playNote(pentatonic) {
  if (muted) return;
  if (!pentatonic) return;
  const freqMap = { C: 261.63, D: 293.66, E: 329.63, G: 392.00, A: 440.00 };
  const freq = freqMap[pentatonic];
  if (!freq) return;
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now);
  const gain = audioCtx.createGain();
  activeGains.push(gain);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.3, now + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 3);
}

const geo = new THREE.BufferGeometry();
const pos = new Float32Array(stars.length * 3);
const col = new Float32Array(stars.length * 3);

for (let i = 0; i < stars.length; i++) {
  const s = stars[i];
  pos[i * 3] = s.x;
  pos[i * 3 + 1] = s.y;
  pos[i * 3 + 2] = s.z;
  const c = spectralColor(s.spect, s.ci);
  col[i * 3] = c.r;
  col[i * 3 + 1] = c.g;
  col[i * 3 + 2] = c.b;
}

geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

function makeSprite() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.8)');
  g.addColorStop(0.4, 'rgba(255,255,255,0.3)');
  g.addColorStop(0.7, 'rgba(255,255,255,0.05)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}

const mat = new THREE.PointsMaterial({
  size: 0.35,
  vertexColors: true,
  transparent: true,
  opacity: 0.92,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
  map: makeSprite(),
});

const points = new THREE.Points(geo, mat);

const scene = new THREE.Scene();
scene.add(points);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(20, 12, 25);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1;
controls.maxDistance = 120;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.8;

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const spriteTex = makeSprite();
const pulses = [];
const animLines = [];
const tooltipEl = document.getElementById('tooltip');
let tooltipTimer = null;
const timelineEl = document.getElementById('star-timeline');
let nameSlotCount;
const nameSlotEls = [];
const nameSlotStates = [];

function buildTimeline() {
  const count = Math.max(1, Math.floor((innerWidth - 40) / 128));
  if (count === nameSlotCount) return;
  nameSlotCount = count;
  timelineEl.innerHTML = '';
  nameSlotEls.length = 0;
  nameSlotStates.length = 0;
  for (let i = 0; i < nameSlotCount; i++) {
    const span = document.createElement('span');
    timelineEl.appendChild(span);
    nameSlotEls.push(span);
    nameSlotStates.push(null);
  }
}
buildTimeline();
window.addEventListener('resize', buildTimeline);

function addNameDisplay(star, duration) {
  const now = performance.now();
  const name = starName(star);
  const minDuration = Math.max(duration, 4000);
  for (let i = 0; i < nameSlotCount; i++) {
    if (nameSlotEls[i].textContent === name) {
      nameSlotStates[i] = { start: now, duration: minDuration };
      return;
    }
  }
  let slot = -1;
  for (let i = 0; i < nameSlotCount; i++) {
    const s = nameSlotStates[i];
    if (!s || now - s.start >= s.duration) { slot = i; break; }
  }
  if (slot === -1) {
    let oldest = 0;
    for (let i = 1; i < nameSlotCount; i++) {
      if (now - nameSlotStates[i].start > now - nameSlotStates[oldest].start) oldest = i;
    }
    slot = oldest;
  }
  nameSlotStates[slot] = { start: now, duration: minDuration };
  nameSlotEls[slot].textContent = name;
}

const chain = { visited: null, list: null, timeout: null, active: false, lastTravel: 0 };
let msPerParsec = 500;
let speedChangedThisStep = false;
let customRotateActive = false;
const customRotateAxis = new THREE.Vector3();
let customRotateSpeed = 0;
let rotationPaused = false;
let useFurthest = false;
let storedMsPerParsec = 500;
let muted = false;
const activeGains = [];

const lastPulsed = [];

function starName(s) {
  if (s.proper) return s.proper;
  if (s.bf) return s.bf.trim();
  if (s.gl) return s.gl;
  if (s.hip) return 'HIP ' + s.hip;
  return 'Star ' + s.id;
}

function showTooltip(s, x, y) {
  const name = starName(s);
  const spect = s.spect || '?';
  const absmag = s.absmag !== undefined && s.absmag !== '' ? s.absmag.toFixed(2) : '?';
  const dist = s.dist ? s.dist.toFixed(2) + ' pc' : '?';
  const pentColors = { C: '#fff', D: '#aac', E: '#fa8', G: '#f84', A: '#f44' };
  const pentColor = pentColors[s.pentatonic] || '#fff';
  tooltipEl.innerHTML =
    '<div class="name">' + name + '</div>' +
    '<span class="pent" style="background:' + pentColor + '"></span>' + s.pentatonic + ' &nbsp;' +
    '<span class="prop">' + spect + '</span> &nbsp;' +
    '<span class="prop">M=' + absmag + '</span> &nbsp;' +
    '<span class="prop">' + dist + '</span>';
  tooltipEl.style.left = Math.min(x + 16, innerWidth - 260) + 'px';
  tooltipEl.style.top = Math.min(y + 16, innerHeight - 100) + 'px';
  tooltipEl.classList.add('visible');
  clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(() => tooltipEl.classList.remove('visible'), 3000);
}

function distSq(a, b) {
  return (a.x - b.x) ** 2 + (a.y - b.y) ** 2 + (a.z - b.z) ** 2;
}

function nearestUnvisited(fromIdx) {
  let best = null, bestDist = Infinity;
  for (let i = 0; i < stars.length; i++) {
    if (chain.visited.has(i)) continue;
    const d = distSq(stars[fromIdx], stars[i]);
    if (d < bestDist) { bestDist = d; best = i; }
  }
  return best;
}

function furthestUnvisited(fromIdx) {
  let best = null, bestDist = -Infinity;
  for (let i = 0; i < stars.length; i++) {
    if (chain.visited.has(i)) continue;
    const d = distSq(stars[fromIdx], stars[i]);
    if (d > bestDist) { bestDist = d; best = i; }
  }
  return best;
}

function scheduleNext(fromIdx) {
  const neighborFn = useFurthest ? furthestUnvisited : nearestUnvisited;
  const next = neighborFn(fromIdx);
  if (next === null) return;
  chain.visited.add(next);
  chain.list.push(next);
  const fromS = stars[fromIdx];
  const toS = stars[next];
  const d = Math.sqrt(distSq(fromS, toS));
  animateLine(new THREE.Vector3(fromS.x, fromS.y, fromS.z), new THREE.Vector3(toS.x, toS.y, toS.z), d * msPerParsec, spectralColor(toS.spect, toS.ci));
  chain.lastTravel = d * msPerParsec;
  chain.timeout = setTimeout(chainTick, d * msPerParsec);
}

function chainTick() {
  speedChangedThisStep = false;
  const idx = chain.list[chain.list.length - 1];
  const s = stars[idx];
  createPulse(new THREE.Vector3(s.x, s.y, s.z), spectralColor(s.spect, s.ci));
  playNote(s.pentatonic);
  addNameDisplay(s, chain.lastTravel * 2);

  if (chain.list.length >= stars.length) {
    const first = chain.list[0];
    const firstS = stars[first];
    const d = Math.sqrt(distSq(s, firstS));
    animateLine(new THREE.Vector3(s.x, s.y, s.z), new THREE.Vector3(firstS.x, firstS.y, firstS.z), d * msPerParsec, spectralColor(firstS.spect, firstS.ci));
    chain.timeout = setTimeout(() => {
      createPulse(new THREE.Vector3(firstS.x, firstS.y, firstS.z), spectralColor(firstS.spect, firstS.ci));
      playNote(firstS.pentatonic);
      addNameDisplay(firstS, d * msPerParsec * 2);
      chain.active = false;
    }, d * msPerParsec);
    return;
  }
  scheduleNext(idx);
}

function createPulse(position, color) {
  const mat = new THREE.SpriteMaterial({
    map: spriteTex,
    color: color,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(0.5, 0.5, 1);
  scene.add(sprite);
  pulses.push({ sprite, mat, start: performance.now(), duration: 900 });

  lastPulsed.push(position.clone());
  if (lastPulsed.length > 4) lastPulsed.shift();
}

function animateLine(fromPos, toPos, duration, color) {
  const dist = fromPos.distanceTo(toPos);
  const dir = new THREE.Vector3().subVectors(toPos, fromPos).normalize();
  const geo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.8,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
  mesh.position.copy(fromPos);
  mesh.scale.y = 0;
  scene.add(mesh);
  animLines.push({
    mesh, from: fromPos.clone(), to: toPos.clone(), dir, dist,
    start: performance.now(), growDuration: duration, fadeDuration: duration * 2,
  });
}

function updateLines() {
  const now = performance.now();
  for (let i = animLines.length - 1; i >= 0; i--) {
    const l = animLines[i];
    const elapsed = now - l.start;
    if (elapsed >= l.growDuration + l.fadeDuration) {
      scene.remove(l.mesh);
      l.mesh.geometry.dispose();
      l.mesh.material.dispose();
      animLines.splice(i, 1);
      continue;
    }
    if (elapsed < l.growDuration) {
      const t = elapsed / l.growDuration;
      l.mesh.scale.y = t * l.dist;
      l.mesh.position.copy(l.from).add(l.dir.clone().multiplyScalar(t * l.dist * 0.5));
      l.mesh.material.opacity = 0.8;
    } else {
      const t = (elapsed - l.growDuration) / l.fadeDuration;
      l.mesh.scale.y = l.dist;
      l.mesh.position.lerpVectors(l.from, l.to, 0.5);
      l.mesh.material.opacity = 0.8 * (1 - t);
    }
  }
}

function updateNameDisplays() {
  const now = performance.now();
  for (let i = 0; i < nameSlotCount; i++) {
    const s = nameSlotStates[i];
    if (!s) { nameSlotEls[i].style.opacity = 0; continue; }
    const elapsed = now - s.start;
    if (elapsed >= s.duration) {
      nameSlotEls[i].style.opacity = 0;
      if (elapsed > s.duration + 500) nameSlotStates[i] = null;
      continue;
    }
    const fadeStart = Math.max(0, s.duration - 2000);
    if (elapsed > fadeStart) {
      nameSlotEls[i].style.opacity = 1 - (elapsed - fadeStart) / 2000;
    } else {
      nameSlotEls[i].style.opacity = 1;
    }
  }
}

function updatePulses() {
  const now = performance.now();
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    const t = (now - p.start) / p.duration;
    if (t >= 1) {
      scene.remove(p.sprite);
      p.mat.dispose();
      pulses.splice(i, 1);
      continue;
    }
    const scale = 0.5 + 2.5 * (1 - Math.pow(1 - t, 3));
    p.sprite.scale.set(scale, scale, 1);
    p.mat.opacity = 1 - t * t;
  }
}

function startChain(idx, clientX, clientY) {
  if (chain.timeout) clearTimeout(chain.timeout);
  animLines.forEach(l => { scene.remove(l.mesh); l.mesh.geometry.dispose(); l.mesh.material.dispose(); });
  animLines.length = 0;
  nameSlotStates.fill(null);
  nameSlotEls.forEach(el => el.textContent = '');
  chain.active = true;
  chain.visited = new Set([idx]);
  chain.list = [idx];
  speedChangedThisStep = false;
  lastPulsed.length = 0;

  const s = stars[idx];
  const p = new THREE.Vector3(s.x, s.y, s.z);
  const c = spectralColor(s.spect, s.ci);
  createPulse(p, c);
  playNote(s.pentatonic);
  showTooltip(s, clientX, clientY);

  scheduleNext(idx);
  addNameDisplay(s, chain.lastTravel * 2);
}

renderer.domElement.addEventListener('click', (event) => {
  pointer.x = (event.clientX / innerWidth) * 2 - 1;
  pointer.y = -(event.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObject(points);
  if (hits.length > 0) {
    startChain(hits[0].index, event.clientX, event.clientY);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

document.addEventListener('keydown', (e) => {
  if (e.key === '+') {
    if (speedChangedThisStep) {
      document.getElementById('k-plus').classList.add('red');
      return;
    }
    speedChangedThisStep = true;
    document.getElementById('k-plus').classList.add('active');
    msPerParsec = Math.max(25, msPerParsec - 50);
  }
  if (e.key === '-') {
    if (speedChangedThisStep) {
      document.getElementById('k-minus').classList.add('red');
      return;
    }
    speedChangedThisStep = true;
    document.getElementById('k-minus').classList.add('active');
    msPerParsec = Math.min(5000, msPerParsec + 50);
  }
  if (e.key === '=') {
    if (speedChangedThisStep) return;
    speedChangedThisStep = true;
    document.getElementById('k-eq').classList.add('active');
    msPerParsec = 500;
  }
  if (e.key === 's') {
    document.getElementById('k-s').classList.add('active');
    startChain(0, innerWidth / 2, innerHeight / 2);
  }
  if (e.key === 'a') {
    customRotateActive = !customRotateActive;
    document.getElementById('k-a').classList.toggle('active', customRotateActive);
    if (customRotateActive) {
      controls.autoRotate = false;
      customRotateAxis.set(Math.random() - 0.5, 1, Math.random() - 0.5).normalize();
      customRotateSpeed = 0.002 + Math.random() * 0.006;
    } else {
      controls.autoRotate = true;
    }
  }
  if (e.key === 'r') {
    rotationPaused = !rotationPaused;
    document.getElementById('k-r').classList.toggle('active', !rotationPaused);
    if (rotationPaused) {
      controls.autoRotate = false;
    } else if (!customRotateActive) {
      controls.autoRotate = true;
    }
  }
  if (e.key === 'd') {
    useFurthest = !useFurthest;
    document.getElementById('k-d').classList.toggle('active', useFurthest);
    if (useFurthest) {
      storedMsPerParsec = msPerParsec;
      msPerParsec = Math.max(25, Math.round(msPerParsec / 4));
    } else {
      msPerParsec = storedMsPerParsec;
    }
    const headIdx = chain.active ? chain.list[chain.list.length - 1] : null;
    if (chain.timeout) clearTimeout(chain.timeout);
    animLines.forEach(l => { scene.remove(l.mesh); l.mesh.geometry.dispose(); l.mesh.material.dispose(); });
    animLines.length = 0;
    nameSlotStates.fill(null);
    nameSlotEls.forEach(el => el.textContent = '');
    if (headIdx !== null) startChain(headIdx, innerWidth / 2, innerHeight / 2);
  }
  if (e.key === 'm') {
    muted = !muted;
    document.getElementById('k-m').classList.toggle('active', muted);
    if (muted && audioCtx) {
      const now = audioCtx.currentTime;
      activeGains.forEach(g => {
        g.gain.cancelScheduledValues(now);
        g.gain.linearRampToValueAtTime(0, now + 0.05);
      });
    }
  }
});

document.addEventListener('keyup', (e) => {
  const momentary = { '+': 'k-plus', '-': 'k-minus', '=': 'k-eq', s: 'k-s' };
  const id = momentary[e.key];
  if (id) document.getElementById(id).classList.remove('active', 'red');
});

window.addEventListener('blur', () => {
  ['k-plus', 'k-minus', 'k-eq', 'k-s'].forEach(id => document.getElementById(id).classList.remove('active'));
});

document.getElementById('keymap').addEventListener('click', (e) => {
  const key = ({ 'k-s':'s', 'k-plus':'+', 'k-minus':'-', 'k-eq':'=', 'k-a':'a', 'k-r':'r', 'k-d':'d', 'k-m':'m' })[e.target.id];
  if (!key) return;
  document.dispatchEvent(new KeyboardEvent('keydown', { key }));
  if ('+-=s'.includes(key)) {
    setTimeout(() => document.dispatchEvent(new KeyboardEvent('keyup', { key })), 100);
  }
});

function animate() {
  requestAnimationFrame(animate);
  if (!rotationPaused) {
    if (customRotateActive) {
      const q = new THREE.Quaternion().setFromAxisAngle(customRotateAxis, customRotateSpeed);
      camera.position.sub(controls.target);
      camera.position.applyQuaternion(q);
      camera.position.add(controls.target);
      camera.lookAt(controls.target);
    }
    controls.update();
  }
  updatePulses();
  updateLines();
  updateNameDisplays();
  renderer.render(scene, camera);
}
animate();
